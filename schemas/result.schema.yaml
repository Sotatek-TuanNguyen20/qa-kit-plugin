# result.schema.yaml
# Kết quả 1 round chạy test. File: results/<module>-r<N>.yaml
#
# NGUYÊN TẮC: test case bất biến, KẾT QUẢ gắn với (round, build).
# Không có 2 field này -> không trả lời được "case này pass ở build nào?"
# = câu khách hỏi nhiều nhất.

type: object
required: [module, round, build_version, env, executed_at, cases]

properties:

  module:        { type: string }
  round:         { type: integer, minimum: 1 }
  build_version:
    type: string
    description: "BẮT BUỘC. Kết quả không gắn build = kết quả vô nghĩa."
  env:
    type: string
    enum: [test, staging]      # KHÔNG có prod. Cố ý.
  executed_at:   { type: string, format: date-time }
  executed_by:   { type: string }

  scope_reason:
    type: string
    enum: [full, retest_failed, regression, spot]
    description: >
      Vì sao round này chạy đúng những case này. Round >= 2 BẮT BUỘC ghi.
      retest_failed  = case fail round trước
      regression     = case đang pass nhưng nằm vùng ảnh hưởng của fix
      Thiếu 'regression' ở round >= 2 -> đang bỏ sót rủi ro fix phá chỗ khác.

  cases:
    type: array
    items:
      type: object
      required: [id, status]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [pass, fail, blocked, skipped, not_run]
          description: >
            blocked = không chạy được vì bug khác chặn đường (KHÁC fail)
            skipped = cố ý bỏ, phải có skip_reason
            not_run = chưa tới lượt. Đếm vào 未消化.
        actual: { type: string }
        skip_reason: { type: string }

        triage:
          type: string
          enum: [A_bug, B_testcase, C_script, D_env, E_spec]
          description: "BẮT BUỘC khi status=fail. Dùng để ROUTING, không để fix."
        triage_confidence:
          type: string
          enum: [high, low]
        reason:
          type: string
          description: >
            Diễn giải tự do (free-text) vì sao gán giá trị 'triage' này. Ghi bởi
            /qa-kit:eval. KHÁC với scope_reason (vì sao round này chạy đúng case này),
            skip_reason (vì sao case bị skip) và blocked_by (bug nào đang chặn) —
            4 field "lý do" khác nhau, đừng lẫn.
        bug_id:
          type: string
          description: "Link sang bug tracker khi triage=A_bug"
        priority:
          type: string
          enum: [P1, P2, P3]
          description: >
            Độ ưu tiên xử lý bug, gán khi triage=A_bug (không bắt buộc cho case khác).
            Regression (prev_status=pass -> status=fail) luôn P1; còn lại QC gán theo
            mức độ ảnh hưởng nghiệp vụ. /qa-kit:report dùng field này để chia bug còn
            mở theo P1/P2/P3.

        blocked_by:
          type: string
          description: "bug_id đang chặn. Bắt buộc khi status=blocked."

        evidence_ref:
          type: array
          items: { type: string }   # screenshot, log

        prev_status:
          type: string
          description: >
            Status của case này ở round trước.
            pass -> fail = REGRESSION. Cờ đỏ, ưu tiên cao nhất trong report.
