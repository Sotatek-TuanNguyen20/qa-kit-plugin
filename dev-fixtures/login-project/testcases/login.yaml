- id: IT-LOGIN-003
  trace: [DD-5]
  test_level: IT
  category:
    large: "Nghiệp vụ đăng xuất"
    medium: "Đăng xuất khỏi hệ thống qua thanh điều hướng"
    small: "Đăng xuất thành công"
  viewpoint: TIMING-02
  precondition_vi:
    - "Đang trong phiên đăng nhập hợp lệ"
  condition_vi: "Bấm 'Đăng xuất' → phiên chuyển sang trạng thái đã đăng xuất, redirect về màn hình đăng nhập, truy cập lại trang cần đăng nhập bị chặn"
  steps:
    - action_vi: "Trong khi đang ở phiên đăng nhập hợp lệ, bấm nút 'Đăng xuất' trên thanh điều hướng"
  expected_vi: "Phiên đăng nhập kết thúc (đăng xuất thành công)."
  evidence:
    section: "DD-5"
    quote: "Người dùng bấm nút \"Đăng xuất\" trên thanh điều hướng để kết thúc phiên đăng nhập."
    source_type: dd
  priority: P1
  automatable: false

- id: IT-LOGIN-004
  trace: [DD-5]
  test_level: IT
  category:
    large: "Nghiệp vụ đăng xuất"
    medium: "Đăng xuất khỏi hệ thống qua thanh điều hướng"
    small: "Phạm vi xoá session khi đăng xuất"
  viewpoint: DATA-06
  precondition_vi:
    - "Đang trong phiên đăng nhập hợp lệ"
    - "Đã đăng nhập đồng thời trên ≥2 thiết bị/trình duyệt khác nhau"
  condition_vi: "Đăng xuất ở 1 thiết bị, kiểm tra phiên đăng nhập ở thiết bị/trình duyệt khác — bị xoá toàn bộ hay chỉ thiết bị hiện tại (DD-5 tự nêu đây là điểm chưa rõ)"
  steps:
    - action_vi: "Đăng nhập cùng 1 tài khoản trên ≥2 thiết bị/trình duyệt khác nhau"
    - action_vi: "Ở thiết bị thứ nhất, bấm nút 'Đăng xuất' trên thanh điều hướng"
    - action_vi: "Kiểm tra trạng thái phiên đăng nhập ở thiết bị thứ hai"
  expected_vi: "Chỉ session ở thiết bị hiện tại (thiết bị vừa đăng xuất) bị xoá; thiết bị/trình duyệt khác vẫn giữ trạng thái đăng nhập cho tới khi token hết hạn."
  evidence:
    section: "GAP-004 (đã trả lời)"
    quote: "Chỉ xoá session ở thiết bị hiện tại; các thiết bị khác vẫn giữ đăng nhập cho tới khi token hết hạn."
    source_type: spec
  priority: P1
  automatable: false
