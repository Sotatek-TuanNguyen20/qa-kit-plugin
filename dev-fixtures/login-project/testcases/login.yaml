# Sinh bởi testcase-generate (bước 4/6 của /qa-kit:design), đọc work/login/details.yaml
# (output thật của detail-fill). Chỉ 4/19 entry có evidence_found: true được lắp thành
# case dưới đây; 15 entry evidence_found: false bị bỏ qua (gap tương ứng đã có sẵn
# trong work/login/gaps.yaml, không tạo case, không ghi gap trùng ở đây). Condition
# "Đăng nhập thành công" (DATA-02) không có case: evidence chỉ chứng minh rule độ dài
# password, không chứng minh được claim "đăng nhập thành công" — đã reclassify thành
# GAP-020 ở detail-fill thay vì tạo case (xem "Phạm vi evidence" trong
# skills/detail-fill/SKILL.md).

- id: IT-LOGIN-001
  trace: [DD-2.1]
  test_level: IT
  category:
    large: "Nghiệp vụ đăng nhập"
    medium: "Đăng nhập bằng tài khoản/mật khẩu"
    small: "Password đúng biên dưới"
  viewpoint: DATA-01
  precondition_vi:
    - "Tài khoản đã được cấp, đang ở trạng thái hoạt động"
  condition_vi: "Password đúng 8 ký tự (biên dưới min)"
  steps:
    - action_vi: "Nhập username hợp lệ của tài khoản đã được cấp"
      data: { username: "user01" }
    - action_vi: "Nhập password đúng 8 ký tự (biên dưới min)"
      data: { password: "Abcd1234" }
    - action_vi: "Bấm nút đăng nhập"
  expected_vi: "Password 8 ký tự không bị từ chối vì lý do độ dài (thoả điều kiện >= 8 theo DD-2.1)."
  evidence:
    section: "DD-2.1"
    quote: "Password từ 8 đến 32 ký tự. DDL: VARCHAR(32) NOT NULL CHECK (LENGTH(password) >= 8)"
    source_type: db_definition
    operator: { min: 8, min_op: ">=", max: 32, max_op: "<=" }
  priority: P1
  automatable: false

